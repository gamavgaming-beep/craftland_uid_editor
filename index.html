<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UID Editor</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

.container {
  max-width:420px;
  margin:auto;
  padding:15px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* Toggle */
.toggle {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.switch {
  width:45px;
  height:22px;
  background:#444;
  border-radius:20px;
  position:relative;
  cursor:pointer;
}

.switch::after {
  content:'';
  width:18px;
  height:18px;
  background:white;
  position:absolute;
  top:2px;
  left:2px;
  border-radius:50%;
  transition:0.3s;
}

.switch.active {
  background:#00f0ff;
}

.switch.active::after {
  left:25px;
}

/* Inputs */
input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#111827;
  color:white;
}

/* Button */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:linear-gradient(90deg,#00f0ff,#7a5fff);
  color:white;
  font-size:16px;
  margin-top:10px;
}

/* Hidden */
.hidden {
  display:none;
}

/* Preview */
.preview {
  background:#111;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>🔥 UID Editor</h2>

<!-- TOGGLES -->
<div class="toggle">
  <span>Custom Bytes</span>
  <div class="switch" id="bytesToggle"></div>
</div>

<div id="bytesUpload" class="hidden">
  <input type="file">
</div>

<div class="toggle">
  <span>Meta File</span>
  <div class="switch" id="metaToggle"></div>
</div>

<div id="metaUpload" class="hidden">
  <input type="file">
</div>

<!-- SLOT -->
<select id="slot">
  <option>Select Slot</option>
</select>

<!-- UID -->
<input type="number" id="uid" placeholder="Enter UID">

<!-- ZIP NAME -->
<h4>ZIP Name</h4>
<label><input type="radio" name="zip" checked onclick="zipMode('default')"> Default (gamav.zip)</label>
<label><input type="radio" name="zip" onclick="zipMode('custom')"> Custom</label>

<input type="text" id="zipName" class="hidden" placeholder="Enter custom zip name">

<!-- PASSWORD -->
<h4>Password</h4>
<label><input type="radio" name="pass" checked onclick="passMode('default')"> Default (123)</label>
<label><input type="radio" name="pass" onclick="passMode('custom')"> Custom</label>

<input type="text" id="password" class="hidden" placeholder="Enter password">

<!-- PREVIEW -->
<div class="preview" id="preview">
UID: - <br>
Slot: - <br>
ZIP: gamav.zip <br>
Password: 123
</div>

<button onclick="generate()">🚀 Generate</button>

</div>
</div>

<script>
// SLOT AUTO GENERATE
let slotSelect = document.getElementById("slot");
for(let i=1;i<=15;i++){
  let opt = document.createElement("option");
  opt.text = "Slot " + i;
  opt.value = i;
  slotSelect.add(opt);
}

// TOGGLES
function toggle(btn, target){
  btn.classList.toggle("active");
  target.classList.toggle("hidden");
}

document.getElementById("bytesToggle").onclick = function(){
  toggle(this, document.getElementById("bytesUpload"));
}

document.getElementById("metaToggle").onclick = function(){
  toggle(this, document.getElementById("metaUpload"));
}

// ZIP MODE
function zipMode(mode){
  document.getElementById("zipName").classList.toggle("hidden", mode==="default");
  updatePreview();
}

// PASS MODE
function passMode(mode){
  document.getElementById("password").classList.toggle("hidden", mode==="default");
  updatePreview();
}

// UPDATE PREVIEW
document.getElementById("uid").oninput = updatePreview;
document.getElementById("slot").onchange = updatePreview;
document.getElementById("zipName").oninput = updatePreview;
document.getElementById("password").oninput = updatePreview;

function updatePreview(){
  let uid = document.getElementById("uid").value || "-";
  let slot = document.getElementById("slot").value || "-";

  let zip = document.querySelector('input[name="zip"]:checked').nextSibling.textContent.includes("Default")
    ? "gamav.zip"
    : document.getElementById("zipName").value || "custom.zip";

  let pass = document.querySelector('input[name="pass"]:checked').nextSibling.textContent.includes("Default")
    ? "123"
    : document.getElementById("password").value || "custom";

  document.getElementById("preview").innerHTML =
    `UID: ${uid}<br>Slot: ${slot}<br>ZIP: ${zip}<br>Password: ${pass}`;
}

// GENERATE
function generate(){
  alert("ZIP Generated (Demo UI)");
}
</script>

</body>
</html>
